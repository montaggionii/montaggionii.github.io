<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">Flujo conceptual entre CRM y mensajería</title><desc id="desc">Datos de prueba pasan por validación, CRM, automatización y canal sandbox.</desc><style>.b{fill:#0b1929}.c{fill:#102942;stroke:#5be5ff;stroke-opacity:.6;stroke-width:2}.t{fill:#f1f6fb;font:700 20px Arial}.d{fill:#b9cfdd;font:14px Arial}.l{fill:#5be5ff;font:600 12px monospace}.a{stroke:#5be5ff;stroke-width:3}</style><rect class="b" width="1200" height="360" rx="24"/><text x="60" y="56" class="l">AUTOMATION · CRM Y MENSAJERÍA</text><g transform="translate(80 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">Datos prueba</text><text x="22" y="80" class="d">Lead / evento</text></g><g transform="translate(360 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">Validación</text><text x="22" y="80" class="d">Consentimiento</text></g><g transform="translate(640 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">CRM</text><text x="22" y="80" class="d">Estado y registro</text></g><g transform="translate(920 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">Sandbox</text><text x="22" y="80" class="d">Canal de prueba</text></g><path class="a" d="M290 190h65m215 0h65m215 0h65"/></svg>
