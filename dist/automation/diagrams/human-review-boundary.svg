<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">Límite de revisión humana</title><desc id="desc">La automatización prepara una acción y una persona revisa excepciones antes de la salida.</desc><style>.b{fill:#0b1929}.c{fill:#102942;stroke:#5be5ff;stroke-opacity:.6;stroke-width:2}.t{fill:#f1f6fb;font:700 20px Arial}.d{fill:#b9cfdd;font:14px Arial}.l{fill:#5be5ff;font:600 12px monospace}</style><rect class="b" width="1200" height="360" rx="24"/><text x="60" y="56" class="l">AUTOMATION · LÍMITE DE REVISIÓN HUMANA</text><g transform="translate(130 125)"><rect class="c" width="240" height="130" rx="14"/><text x="24" y="48" class="t">Automatización</text><text x="24" y="80" class="d">Prepara propuesta</text></g><g transform="translate(480 105)"><rect class="c" width="240" height="170" rx="14"/><text x="24" y="55" class="t">Revisión humana</text><text x="24" y="92" class="d">Aprueba, corrige</text><text x="24" y="118" class="d">o detiene flujo</text></g><g transform="translate(830 125)"><rect class="c" width="240" height="130" rx="14"/><text x="24" y="48" class="t">Salida</text><text x="24" y="80" class="d">Acción registrada</text></g></svg>
