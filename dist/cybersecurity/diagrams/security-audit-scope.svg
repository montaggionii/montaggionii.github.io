<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">Alcance autorizado de un laboratorio de seguridad</title><desc id="desc">Los laboratorios se limitan a aplicaciones propias o entornos de prueba con autorización.</desc><style>.b{fill:#0b1929}.c{fill:#102942;stroke:#71e4a4;stroke-opacity:.65;stroke-width:2}.t{fill:#f1f6fb;font:700 20px Arial}.d{fill:#b9cfdd;font:14px Arial}.l{fill:#71e4a4;font:600 12px monospace}</style><rect class="b" width="1200" height="360" rx="24"/><text x="60" y="56" class="l">CYBERSECURITY · ALCANCE AUTORIZADO</text><g transform="translate(105 120)"><rect class="c" width="275" height="145" rx="14"/><text x="25" y="52" class="t">Permitido</text><text x="25" y="86" class="d">Aplicación propia</text><text x="25" y="112" class="d">Entorno de prueba</text></g><g transform="translate(465 120)"><rect class="c" width="275" height="145" rx="14"/><text x="25" y="52" class="t">Requisito</text><text x="25" y="86" class="d">Alcance definido</text><text x="25" y="112" class="d">Autorización expresa</text></g><g transform="translate(825 120)"><rect class="c" width="275" height="145" rx="14"/><text x="25" y="52" class="t">Excluido</text><text x="25" y="86" class="d">Sistemas terceros</text><text x="25" y="112" class="d">Sin permiso</text></g></svg>
