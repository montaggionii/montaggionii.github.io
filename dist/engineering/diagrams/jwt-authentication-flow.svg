<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">Flujo de autenticación JWT</title><desc id="desc">Login, validación de credenciales, emisión de token, interceptor y recurso protegido.</desc><style>.b{fill:#0b1929}.c{fill:#102942;stroke:#5be5ff;stroke-opacity:.6;stroke-width:2}.t{fill:#f1f6fb;font:700 20px Arial}.d{fill:#b9cfdd;font:14px Arial}.l{fill:#5be5ff;font:600 12px monospace}.a{stroke:#5be5ff;stroke-width:3}</style><rect class="b" width="1200" height="360" rx="24"/><text x="60" y="56" class="l">ENGINEERING · JWT AUTHENTICATION</text><g transform="translate(45 125)"><rect class="c" width="190" height="130" rx="14"/><text x="22" y="48" class="t">1. Login</text><text x="22" y="80" class="d">Credenciales</text></g><g transform="translate(275 125)"><rect class="c" width="190" height="130" rx="14"/><text x="22" y="48" class="t">2. API</text><text x="22" y="80" class="d">Valida acceso</text></g><g transform="translate(505 125)"><rect class="c" width="190" height="130" rx="14"/><text x="22" y="48" class="t">3. JWT</text><text x="22" y="80" class="d">Token con rol</text></g><g transform="translate(735 125)"><rect class="c" width="190" height="130" rx="14"/><text x="22" y="48" class="t">4. Cliente</text><text x="22" y="80" class="d">Interceptor</text></g><g transform="translate(965 125)"><rect class="c" width="190" height="130" rx="14"/><text x="22" y="48" class="t">5. Recurso</text><text x="22" y="80" class="d">Autorizado</text></g><path class="a" d="M235 190h35m195 0h35m195 0h35m195 0h35"/></svg>
