<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc"><title id="title">Flujo del sistema de puntos</title><desc id="desc">Una compra o promoción crea un movimiento de puntos, actualiza el saldo del usuario por restaurante y habilita el canje de recompensas.</desc><style>.bg{fill:#0b1929}.card{fill:#102942;stroke:#5be5ff;stroke-opacity:.55;stroke-width:2}.n{fill:#5be5ff;font:600 13px monospace}.t{fill:#f1f6fb;font:700 19px Arial,sans-serif}.d{fill:#b9cfdd;font:15px Arial,sans-serif}.l{stroke:#5be5ff;stroke-width:3}</style><rect class="bg" width="1200" height="390" rx="24"/><text x="60" y="65" class="n">FIDELYFOOD · TRAZABILIDAD DE PUNTOS</text><g transform="translate(60 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">Compra</text><text x="24" y="82" class="d">o promoción</text><text x="24" y="108" class="d">aplicable</text></g><g transform="translate(340 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">Movimiento</text><text x="24" y="82" class="d">Acumulación</text><text x="24" y="108" class="d">o canje</text></g><g transform="translate(620 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">Saldo</text><text x="24" y="82" class="d">Puntos por</text><text x="24" y="108" class="d">restaurante</text></g><g transform="translate(900 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">Recompensa</text><text x="24" y="82" class="d">Validación y</text><text x="24" y="108" class="d">canje</text></g><path class="l" d="M270 197h65m215 0h65m215 0h65"/></svg>
