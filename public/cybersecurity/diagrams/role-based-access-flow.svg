<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">Control de acceso basado en roles</title><desc id="desc">Un token identifica a un usuario y la API comprueba si su rol permite la operación.</desc><style>.b{fill:#0b1929}.c{fill:#102942;stroke:#71e4a4;stroke-opacity:.65;stroke-width:2}.t{fill:#f1f6fb;font:700 20px Arial}.d{fill:#b9cfdd;font:14px Arial}.l{fill:#71e4a4;font:600 12px monospace}</style><rect class="b" width="1200" height="360" rx="24"/><text x="60" y="56" class="l">CYBERSECURITY · CONTROL DE ACCESO POR ROL</text><g transform="translate(80 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">Usuario</text><text x="22" y="80" class="d">Inicia sesión</text></g><g transform="translate(360 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">JWT</text><text x="22" y="80" class="d">Identidad + rol</text></g><g transform="translate(640 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">Política</text><text x="22" y="80" class="d">Acción permitida</text></g><g transform="translate(920 125)"><rect class="c" width="210" height="130" rx="14"/><text x="22" y="48" class="t">Recurso</text><text x="22" y="80" class="d">Autoriza / deniega</text></g></svg>
