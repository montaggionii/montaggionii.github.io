<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">Capas de una aplicación Spring Boot</title><desc id="desc">Cliente, controller, servicio, persistencia y base de datos separados por responsabilidades.</desc><style>.b{fill:#0b1929}.c{fill:#102942;stroke:#5be5ff;stroke-opacity:.6;stroke-width:2}.t{fill:#f1f6fb;font:700 22px Arial}.d{fill:#b9cfdd;font:15px Arial}.l{fill:#5be5ff;font:600 12px monospace}.a{stroke:#5be5ff;stroke-width:3}</style><rect class="b" width="1200" height="360" rx="24"/><text x="60" y="56" class="l">ENGINEERING · SPRING BOOT POR CAPAS</text><g transform="translate(55 115)"><rect class="c" width="205" height="150" rx="14"/><text x="24" y="52" class="t">Cliente</text><text x="24" y="86" class="d">Angular / Ionic</text><text x="24" y="112" class="d">Solicitud HTTP</text></g><g transform="translate(335 115)"><rect class="c" width="205" height="150" rx="14"/><text x="24" y="52" class="t">Controller</text><text x="24" y="86" class="d">API REST</text><text x="24" y="112" class="d">Entrada / salida</text></g><g transform="translate(615 115)"><rect class="c" width="205" height="150" rx="14"/><text x="24" y="52" class="t">Service</text><text x="24" y="86" class="d">Reglas de negocio</text><text x="24" y="112" class="d">Validaciones</text></g><g transform="translate(895 115)"><rect class="c" width="250" height="150" rx="14"/><text x="24" y="52" class="t">Persistencia</text><text x="24" y="86" class="d">DAO · JPA / Hibernate</text><text x="24" y="112" class="d">Base de datos</text></g><path class="a" d="M260 190h70m210 0h70m210 0h70"/></svg>
