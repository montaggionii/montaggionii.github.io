<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc"><title id="title">Flujo de autenticación JWT</title><desc id="desc">El usuario inicia sesión, el backend valida credenciales y entrega un JWT que Angular adjunta a las solicitudes protegidas.</desc><style>.bg{fill:#0b1929}.card{fill:#102942;stroke:#5be5ff;stroke-opacity:.55;stroke-width:2}.n{fill:#5be5ff;font:600 13px monospace}.t{fill:#f1f6fb;font:700 19px Arial,sans-serif}.d{fill:#b9cfdd;font:15px Arial,sans-serif}.l{stroke:#5be5ff;stroke-width:3}</style><rect class="bg" width="1200" height="390" rx="24"/><text x="60" y="65" class="n">FIDELYFOOD · AUTENTICACIÓN JWT</text><g transform="translate(60 125)"><rect class="card" width="190" height="145" rx="14"/><text x="24" y="50" class="t">1. Login</text><text x="24" y="82" class="d">Email y contraseña</text><text x="24" y="108" class="d">desde Angular/Ionic</text></g><g transform="translate(310 125)"><rect class="card" width="190" height="145" rx="14"/><text x="24" y="50" class="t">2. API</text><text x="24" y="82" class="d">Spring Security</text><text x="24" y="108" class="d">valida credenciales</text></g><g transform="translate(560 125)"><rect class="card" width="190" height="145" rx="14"/><text x="24" y="50" class="t">3. JWT</text><text x="24" y="82" class="d">Token con rol</text><text x="24" y="108" class="d">USER / RESTAURANT</text></g><g transform="translate(810 125)"><rect class="card" width="190" height="145" rx="14"/><text x="24" y="50" class="t">4. Guard</text><text x="24" y="82" class="d">Interceptor adjunta</text><text x="24" y="108" class="d">Authorization header</text></g><g transform="translate(1060 125)"><rect class="card" width="100" height="145" rx="14"/><text x="16" y="50" class="t">5.</text><text x="16" y="82" class="d">Ruta</text><text x="16" y="108" class="d">segura</text></g><path class="l" d="M250 197h55m195 0h55m195 0h55m195 0h55"/></svg>
