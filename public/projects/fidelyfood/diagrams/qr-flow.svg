<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc"><title id="title">Flujo de QR de FidelyFood</title><desc id="desc">Un usuario dispone de un QR de identificación, el restaurante lo escanea y la API valida al usuario antes de continuar con la operación.</desc><style>.bg{fill:#0b1929}.card{fill:#102942;stroke:#5be5ff;stroke-opacity:.55;stroke-width:2}.n{fill:#5be5ff;font:600 13px monospace}.t{fill:#f1f6fb;font:700 19px Arial,sans-serif}.d{fill:#b9cfdd;font:15px Arial,sans-serif}.l{stroke:#5be5ff;stroke-width:3}</style><rect class="bg" width="1200" height="390" rx="24"/><text x="60" y="65" class="n">FIDELYFOOD · IDENTIFICACIÓN QR</text><g transform="translate(80 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">Usuario</text><text x="24" y="82" class="d">Consulta su QR</text><text x="24" y="108" class="d">de identificación</text></g><g transform="translate(360 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">Restaurante</text><text x="24" y="82" class="d">Escanea mediante</text><text x="24" y="108" class="d">cámara / lector</text></g><g transform="translate(640 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">API REST</text><text x="24" y="82" class="d">Identifica y valida</text><text x="24" y="108" class="d">usuario y contexto</text></g><g transform="translate(920 125)"><rect class="card" width="210" height="145" rx="14"/><text x="24" y="50" class="t">Operación</text><text x="24" y="82" class="d">Puntos o canje</text><text x="24" y="108" class="d">registrado</text></g><path class="l" d="M290 197h65m215 0h65m215 0h65"/></svg>
